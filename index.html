<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delago Beauty Studio | Cílios e Estética</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           TODO O ESTILO DO SITE (PRETO E DOURADO)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a; /* Fundo Preto */
            color: #f5f5f5;
            line-height: 1.6;
        }

        /* PAREDE PRETA COM ILUMINAÇÃO DE SPOTLIGHTS */
        .studio-wall {
            background: #0f0f0f;
            background-image: 
                radial-gradient(circle at 30% 0%, rgba(212, 175, 55, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.3) 0%, transparent 45%),
                radial-gradient(circle at 70% 0%, rgba(212, 175, 55, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 50% 30%, #141414 0%, #080808 100%);
            text-align: center;
            padding: 100px 20px;
            border-bottom: 2px solid #222;
            position: relative;
            overflow: hidden;
        }

        .logo-container {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        /* Efeito 3D na letra D */
        .big-d {
            font-size: 6.5rem;
            color: #d4af37;
            text-shadow: 
                1px 1px 0px #8b7320,
                2px 2px 0px #705d1a,
                3px 3px 0px #554714,
                4px 4px 0px #3a300e,
                5px 5px 8px rgba(0, 0, 0, 0.8);
            margin-right: -5px;
            vertical-align: middle;
        }

        /* Efeito 3D no restante do nome ELAGO */
        .rest-logo {
            font-size: 3.5rem;
            color: #d4af37;
            letter-spacing: 4px;
            text-shadow: 
                1px 1px 0px #8b7320,
                2px 2px 0px #705d1a,
                3px 3px 0px #554714,
                4px 4px 6px rgba(0, 0, 0, 0.9);
            vertical-align: middle;
        }

        /* Sub-texto BEAUTY STUDIO */
        .sub-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: #e5c158;
            text-transform: uppercase;
            letter-spacing: 9px;
            margin-top: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
            padding-left: 9px;
        }

        /* SEÇÃO DE LISTA DE SERVIÇOS */
        .services {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            margin-bottom: 40px;
            color: #d4af37;
            letter-spacing: 3px;
        }

        h2::after {
            content: '';
            display: block;
            width: 65px;
            height: 1px;
            background-color: #aa9144;
            margin: 15px auto 0 auto;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            padding: 18px 10px;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.3s;
        }

        .service-item:hover {
            background-color: #121212;
        }

        .service-item span:first-child {
            font-weight: 400;
            letter-spacing: 1px;
        }

        .
