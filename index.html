<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio de Beleza | Cílios e Estética</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- CABEÇALHO -->
    <header>
        <h1>STUDIO BELEZA</h1>

    </header>

    <!-- SEÇÃO DE SERVIÇOS -->
    <section class="services">
        <h2>Nossos Serviços</h2>
        <div class="service-item">
            <span>Fio a Fio Clássico</span>
            <span>R$ 120,00</span>
        </div>
        <div class="service-item">
            <span>Volume Russo</span>
            <span>R$ 180,00</span>
        </div>
        <div class="service-item">
            <span>Lash Lifting</span>
            <span>R$ 100,00</span>
        </div>

    <!-- SEÇÃO DE GALERIA (NOVA) -->
    <section class="gallery">
        <h2>Resultados Reais</h2>
        <div class="gallery-container">
            <!-- Foto 1 -->
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300x400" alt="Antes e Depois Cílios 1">
                <p>Volume Brasileiro</p>
            </div>
            <!-- Foto 2 -->
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300x400" alt="Antes e Depois Cílios 2">

            </div>
            <!-- Foto 3 -->
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300x400" alt="Antes e Depois Cílios 3">

            </div>
        </div>
    </section>

    <!-- SEÇÃO DE CHAMADA PARA AÇÃO (WHATSAPP) -->
    <section class="cta">
        <a href="https://wa.me/5511999999999" target="_blank" class="whatsapp-btn">
            Agendar pelo WhatsApp
        </a>
    </section>

    <!-- RODAPÉ -->
    <footer>
        <p>&copy; 2024 Studio de Beleza. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
